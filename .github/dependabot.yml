# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Maintain Bun dependencies
  # Individual PRs for better control and easier debugging
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 20
    assignees:
      - "fjpalacios"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    # Block typescript major bumps until typescript-eslint publishes a version
    # compatible with typescript 7.x. typescript-estree@8.63.0 (latest 8.x) reads
    # `ts.Extension.Cjs` which no longer exists in typescript@7, breaking ESLint
    # config load with ERR_INTERNAL_ASSERTION.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Maintain GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    assignees:
      - "fjpalacios"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels:
      - "github-actions"
      - "automated"
