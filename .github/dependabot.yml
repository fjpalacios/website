# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Maintain Bun dependencies
  # Individual PRs for better control and easier debugging
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 20
    assignees:
      - "fjpalacios"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    # No groups - individual PRs per dependency for easier debugging
    # and selective merging when some updates break tests
    # Astro 6.4.x currently breaks the dev server for catch-all getStaticPaths
    # routes in this project. Keep Astro on 6.3.x until upstream fixes:
    # https://github.com/withastro/astro/issues/16949
    # @astrojs/mdx 6.x requires newer Astro internals, so it is blocked too.
    ignore:
      - dependency-name: "astro"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "@astrojs/mdx"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "playwright"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]

  # Maintain GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    assignees:
      - "fjpalacios"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels:
      - "github-actions"
      - "automated"
